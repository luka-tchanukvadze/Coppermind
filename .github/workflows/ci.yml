name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      # Prisma client isn't committed - generate it before typecheck,
      # same command the Dockerfile runs at build time.
      - name: Generate Prisma client
        run: npx prisma generate --schema=./backend/prisma/schema.prisma

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint
