name: Backend CI/CD

on:
  push:
    branches:
      - master
    paths:
      - "backend/**"
      - "Dockerfile"
      - ".dockerignore"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "eslint.config.mjs"
      - "types.d.ts"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - "Dockerfile"
      - ".dockerignore"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "eslint.config.mjs"
      - "types.d.ts"
      - ".github/workflows/ci.yml"

jobs:
  checks:
    name: Backend checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      # Prisma client isn't committed - generate it before typecheck,
      # same command the Dockerfile runs at build time.
      - name: Generate Prisma client
        run: npx prisma generate --schema=./backend/prisma/schema.prisma

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

  build-and-push:
    name: Build and push image
    # the gate: only build after checks pass, and only on a push to master
    # (never on pull_request - PRs get checked but not deployed).
    needs: checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ghcr.io/luka-tchanukvadze/coppermind-backend:latest
